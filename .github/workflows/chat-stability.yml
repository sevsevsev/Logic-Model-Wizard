name: Chat Stability

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/lib/chat/**'
      - 'src/app/api/chat/**'
      - '.github/workflows/chat-stability.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'src/lib/chat/**'
      - 'src/app/api/chat/**'
      - '.github/workflows/chat-stability.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  chat-stability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guardrails tests
        run: npm run test:guardrails

      - name: Run chat route tests
        run: npm run test:chat-route
